<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2D2A6E"/>
      <stop offset="100%" stop-color="#1E1B4B"/>
    </linearGradient>
    <clipPath id="round">
      <rect width="100" height="100" rx="18"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="18" fill="url(#bg)"/>

  <!-- Checkered accent top-right -->
  <rect x="70" y="4"  width="12" height="12" fill="#DC2626"/>
  <rect x="82" y="4"  width="12" height="12" fill="#FFFBF0" opacity="0.85"/>
  <rect x="70" y="16" width="12" height="12" fill="#FFFBF0" opacity="0.85"/>
  <rect x="82" y="16" width="12" height="12" fill="#DC2626"/>

  <!-- Bold "7" — dominant, Bebas-weight feel via Impact -->
  <text
    x="40" y="63"
    font-family="'Impact','Arial Narrow',Arial,sans-serif"
    font-size="72" font-weight="900"
    fill="#DC2626" text-anchor="middle"
    letter-spacing="-2">7</text>

  <!-- Supercar silhouette — Bugatti/Lambo side profile -->
  <!-- Body: low wedge shape, long hood, short tail -->
  <path d="
    M  4,90
    L  4,80
    L  9,72
    L 18,65
    L 30,61
    L 45,59
    L 64,59
    L 74,62
    L 84,68
    L 91,77
    L 93,84
    L 93,90
    Z"
    fill="rgba(255,255,255,0.17)"
    clip-path="url(#round)"/>

  <!-- Front wheel arch cutout -->
  <circle cx="24" cy="90" r="14" fill="#1E1B4B"/>
  <!-- Front wheel rim ring -->
  <circle cx="24" cy="90" r="9.5" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="2.2"/>
  <!-- Front wheel hub -->
  <circle cx="24" cy="90" r="3" fill="rgba(255,255,255,0.25)"/>
  <!-- Front wheel spokes (3) -->
  <line x1="24" y1="84" x2="24" y2="80.5" stroke="rgba(255,255,255,0.2)" stroke-width="1.2"/>
  <line x1="29.2" y1="87" x2="32.1" y2="84.5" stroke="rgba(255,255,255,0.2)" stroke-width="1.2"/>
  <line x1="18.8" y1="87" x2="15.9" y2="84.5" stroke="rgba(255,255,255,0.2)" stroke-width="1.2"/>

  <!-- Rear wheel arch cutout -->
  <circle cx="77" cy="90" r="14" fill="#1E1B4B"/>
  <!-- Rear wheel rim ring -->
  <circle cx="77" cy="90" r="9.5" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="2.2"/>
  <!-- Rear wheel hub -->
  <circle cx="77" cy="90" r="3" fill="rgba(255,255,255,0.25)"/>
  <!-- Rear wheel spokes (3) -->
  <line x1="77" y1="84" x2="77" y2="80.5" stroke="rgba(255,255,255,0.2)" stroke-width="1.2"/>
  <line x1="82.2" y1="87" x2="85.1" y2="84.5" stroke="rgba(255,255,255,0.2)" stroke-width="1.2"/>
  <line x1="71.8" y1="87" x2="68.9" y2="84.5" stroke="rgba(255,255,255,0.2)" stroke-width="1.2"/>

  <!-- Windshield highlight -->
  <path d="M 32,60 L 46,59 L 48,63 L 34,64 Z" fill="rgba(255,255,255,0.12)"/>

  <!-- Red accent line above car body -->
  <rect x="4" y="60" width="89" height="1.5" fill="#DC2626" opacity="0.45" rx="0.75"/>
</svg>
